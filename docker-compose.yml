version: "3.9"

services:

  # ── MySQL Database ───────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: feedback_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DB}
    ports:
      - "3307:3306"       # maps host port 3307 → container port 3306
                          # using 3307 to avoid conflict with local XAMPP
    volumes:
      - mysql_data:/var/lib/mysql        # persists data between restarts
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql  # auto-runs on first start
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  # ── Streamlit App ────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: feedback_app
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      MYSQL_HOST: db                     # use service name, not localhost
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_DB: ${MYSQL_DB}
      MYSQL_PORT: 3306
      GROQ_API_KEY: ${GROQ_API_KEY}
    depends_on:
      db:
        condition: service_healthy       # wait for MySQL to be ready
    volumes:
      - ./models:/app/models             # persist trained models
      - ./data:/app/data                 # persist data files

# ── Named volumes ─────────────────────────────────────────
volumes:
  mysql_data:
    driver: local
    